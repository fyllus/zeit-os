# yaml-language-server: $schema=https://blue-build.org
name: zeit-os
description: Zeit-OS is a custom image for Fedora Sway Atomic.

base-image: ghcr.io/wayblueorg/sway
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /
 
  - type: dnf
    repos:
      copr:
        - swayfx/swayfx
        - lihaohong/yazi
        - tofik/nwg-shell
    
    replace:
      - from-repo: copr:copr.fedorainfracloud.org:swayfx:swayfx
        packages:
          - old: sway
            new: swayfx

    install:
      packages:
        - git
        - micro
        - btop     
        - pamixer
        - grimshot
        - slurp
        - swappy
        - fzf
        - yazi
        - nwg-look 
        - nwg-bar
        - godot
        - curl
        - gtklock 
  
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - io.gitlab.librewolf-community
        uninstall:
          - org.mozilla.firefox
          - org.gnome.Loupe
      - scope: user
  - type: signing
