# yaml-language-server: $schema=https://blue-build.org
name: zeit-os
description: Zeit-OS is a custom image for Fedora Sway Atomic.

base-image: ghcr.io/ublue-os/sway-atomic-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /
 
  - type: dnf
    repos:
      copr:
        - swayfx/swayfx
        - lihaohong/yazi
        - tofik/nwg-shell
        - dhalucario/ly
    
    replace:
      - from-repo: copr:copr.fedorainfracloud.org:swayfx:swayfx
        packages:
          - old: sway
            new: swayfx

    install:
      packages:
        - micro
        - btop
        - fuzzel
        - pamixer
        - grimshot
        - slurp
        - swappy
        - fzf
        - yazi
        - nwg-look 
        - nwg-bar
        - godot
        - curl
        - gtklock
        - ly
    remove:
      packages:
        - swaylock
        - rofi-wayland
        - firefox
        - firefox-langpacks
  
  
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - io.gitlab.librewolf-community
        uninstall:
          - org.mozilla.firefox
          - org.gnome.Loupe
      - scope: user

  - type: signing
