# yaml-language-server: $schema=https://blue-build.org
name: zeit-os
description: This is my personal OS image with SwayFX and Zed.

base-image: ghcr.io/ublue-os/sway-atomic-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  # GERENCIADOR DNF: Configura os repositórios, faz a substituição e instala apps nativos
  - type: dnf
    repos:
      copr:
        - swayfx/swayfx
        - lihaohong/yazi
        - tofik/nwg-shell
    
    replace:
      - from-repo: copr:copr.fedorainfracloud.org:swayfx:swayfx
        packages:
          - old: sway
            new: swayfx

    install:
      packages:
        - micro
        - btop
        - fuzzel
        - pamixer
        - grimshot
        - slurp
        - swappy
        - fzf
        - yazi
        - nwg-look 
        - nwg-bar
        - godot
        - curl
    remove:
      packages:
        - rofi
        - firefox
        - firefox-langpacks

  # INSTALAÇÃO GLOBAL DO ZED EDITOR
  - type: script
    snippets:
      - curl -fL https://zed.dev -o /tmp/install_zed.sh
      - HOME=/usr/local share_dir=/usr/local/share bin_dir=/usr/local/bin sh /tmp/install_zed.sh
      - rm /tmp/install_zed.sh


  # CENTRAL DE FLATPAKS: Instalando navegadores e visualizadores isolados
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe
          - io.gitlab.librewolf-community
      - scope: user

  - type: signing
