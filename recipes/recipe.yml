# yaml-language-server: $schema=https://blue-build.org
name: zeit-os
description: This is my personal OS image with SwayFX and Zed.

base-image: ghcr.io/ublue-os/sway-atomic-main
image-version: '44'

modules:
  - type: files
    files:
      - source: system
        destination: /

  # GERENCIADOR DNF: Configura os repositórios, faz a substituição e instala apps
  - type: dnf
    repos:
      copr:
        - swayfx/swayfx
        - lihaohong/yazi
    
    # Substitui o Sway padrão pelo SwayFX vindo do repositório Copr
    replace:
      - from-repo: copr:copr.fedorainfracloud.org:swayfx:swayfx
        packages:
          - old: sway
            new: swayfx

    install:
      packages:
        - micro
        - librewolf
        - btop
        - fuzzel
        - pamixer
        - grimshot
        - slurp
        - swappy
        - fzf
        - yazi
        - nwg-look
        - nwg-bar
        - godot
        - curl
    remove:
      packages:
        - rofi
        - firefox
        - firefox-langpacks

  # INSTALAÇÃO GLOBAL DO ZED EDITOR
  - type: script
    snippets:
      - echo "Instalando o Zed Editor de forma global..."
      - curl -f https://zed.dev | HOME=/usr/local/ share_dir=/usr/local/share bin_dir=/usr/local/bin sh

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe
      - scope: user

  - type: signing
